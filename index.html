<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
</head>
<body>
    <div class="wrapper">
        <h1>Calculator</h1>
        <div class="container">
            <div class="display">Enter Number</div>
            <div class="row one">
                <button class="btn clear">C</button>
                <button class="btn negative">(-)</button>
                <button class="btn del">DEL</button>
                <button class="btn plus">+</button>
            </div>
            <div class="row two">
                <button class="btn seven num">7</button>
                <button class="btn eight num">8</button>
                <button class="btn nine num">9</button>
                <button class="btn minus">-</button>
            </div>
            <div class="row three">
                <button class="btn four num">4</button>
                <button class="btn five num">5</button>
                <button class="btn six num">6</button>
                <button class="btn multiply">*</button>
            </div>
            <div class="row four">
                <button class="btn one num">1</button>
                <button class="btn two num">2</button>
                <button class="btn three num">3</button>
                <button class="btn divide">/</button>
            </div>
            <div class="row five">
                <button class="btn zero num">0</button>
                <button class="btn power">^</button>
                <button class="btn equal">=</button>
                
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
