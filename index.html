<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Calculator </h1>
    <div class="buttons">
        <div class="row one">
            <button class="btn clear">C</button>
            <button class="btn dot">.</button>
            <button class="btn del">DEL</button>
            <button class="btn plus">+</button>
        </div>
        <div class="row two">
            <button class="btn seven">7</button>
            <button class="btn eight">8</button>
            <button class="btn nine">9</button>
            <button class="btn minus">-</button>
        </div>
        <div class="row three">
            <button class="btn four">4</button>
            <button class="btn five">5</button>
            <button class="btn six">6</button>
            <button class="btn multiply">*</button>
        </div>
        <div class="row four">
            <button class="btn three">1</button>
            <button class="btn two">2</button>
            <button class="btn one">3</button>
            <button class="btn divide">/</button>
        </div>
        <div class="row five">
            <button class="btn zero">0</button>
            <button class="btn power">^</button>
            <button class="btn equal">=</button>
            
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
